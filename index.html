<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>বয়স ক্যালকুলেটর</title>
    <style>
        body { 
            margin: 0; padding: 0; 
            height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: sans-serif; overflow: hidden;
        }
        .container { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 30px; border-radius: 20px; text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 10; width: 320px;
        }
        input { padding: 10px; width: 80%; margin-bottom: 15px; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 10px 20px; background: #ff416c; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #output { margin-top: 20px; font-weight: bold; line-height: 1.6; }
        
        .flower { position: absolute; font-size: 24px; animation: float 10s linear infinite; }
        @keyframes float { 0% { transform: translateY(100vh); } 100% { transform: translateY(-10vh); } }
    </style>
</head>
<body>

<div id="emoji-box"></div>
<div class="container">
    <h2>বয়স ক্যালকুলেটর</h2>
    <input type="date" id="dob">
    <br>
    <button onclick="startCalc()">সাবমিট</button>
    <div id="output"></div>
</div>

<script>
    let timer;
    function startCalc() {
        if(timer) clearInterval(timer);
        timer = setInterval(update, 1000);
        update();
    }

    function update() {
        const dob = new Date(document.getElementById('dob').value);
        if(isNaN(dob)) return;
        const now = new Date();
        
        let diff = now - dob;
        
        let seconds = Math.floor(diff / 1000);
        let minutes = Math.floor(seconds / 60);
        let hours = Math.floor(minutes / 60);
        let days = Math.floor(hours / 24);
        
        let years = Math.floor(days / 365);
        let remainingDays = days % 365;
        let months = Math.floor(remainingDays / 30);
        let finalDays = remainingDays % 30;

        document.getElementById('output').innerHTML = `
            বয়স: ${years} বছর, ${months} মাস, ${finalDays} দিন<br>
            মোট মিনিট: ${minutes.toLocaleString('bn-BD')}<br>
            মোট সেকেন্ড: ${seconds.toLocaleString('bn-BD')}
        `;
    }

    // ব্যাকগ্রাউন্ড ইমোজি
    setInterval(() => {
        let f = document.createElement('div');
        f.innerHTML = ['🌸','🌺','🌻'][Math.floor(Math.random()*3)];
        f.className = 'flower';
        f.style.left = Math.random()*100 + 'vw';
        document.getElementById('emoji-box').appendChild(f);
        setTimeout(() => f.remove(), 10000);
    }, 1000);
</script>
</body>
</html>
